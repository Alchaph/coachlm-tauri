<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="shoe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c23152"/>
    </linearGradient>
    <linearGradient id="sole" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square -->
  <rect x="32" y="32" width="960" height="960" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle grid/track lines in background -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="2" fill="none">
    <ellipse cx="512" cy="520" rx="380" ry="320"/>
    <ellipse cx="512" cy="520" rx="320" ry="260"/>
    <ellipse cx="512" cy="520" rx="260" ry="200"/>
  </g>

  <!-- Running shoe - stylized side view -->
  <g transform="translate(140, 280) scale(1.0)" >
    <!-- Sole / midsole -->
    <path d="M 120 420 
             Q 80 420 60 400 
             L 50 380 
             Q 45 360 70 350 
             L 180 340 
             L 620 320 
             Q 680 315 720 330 
             L 740 350 
             Q 750 380 720 400 
             L 700 410 
             Q 660 425 600 425 
             L 120 420 Z" 
          fill="url(#sole)" opacity="0.95"/>

    <!-- Sole tread marks -->
    <g stroke="#ccc" stroke-width="3" opacity="0.5">
      <line x1="150" y1="395" x2="150" y2="415"/>
      <line x1="200" y1="390" x2="200" y2="418"/>
      <line x1="250" y1="385" x2="250" y2="418"/>
      <line x1="300" y1="380" x2="300" y2="418"/>
      <line x1="350" y1="375" x2="350" y2="418"/>
      <line x1="400" y1="370" x2="400" y2="418"/>
      <line x1="450" y1="365" x2="450" y2="420"/>
      <line x1="500" y1="360" x2="500" y2="420"/>
      <line x1="550" y1="355" x2="550" y2="422"/>
      <line x1="600" y1="350" x2="600" y2="420"/>
      <line x1="650" y1="350" x2="650" y2="415"/>
    </g>

    <!-- Shoe upper body -->
    <path d="M 100 380 
             Q 70 370 60 340 
             L 55 300 
             Q 50 250 80 220 
             L 140 180 
             Q 180 155 230 150 
             L 300 148 
             Q 380 145 440 170 
             L 500 200 
             Q 540 220 560 240 
             L 600 270 
             Q 640 295 680 310 
             L 720 325 
             Q 740 335 730 350 
             L 700 360 
             Q 660 370 600 360 
             L 180 350 
             Q 130 355 100 380 Z" 
          fill="url(#shoe)"/>

    <!-- Shoe collar/ankle opening -->
    <path d="M 80 220 
             Q 70 200 80 180 
             L 120 150 
             Q 150 135 190 130 
             L 250 125 
             Q 290 122 310 135 
             L 300 148 
             Q 260 142 230 150 
             L 140 180 
             Q 110 195 80 220 Z" 
          fill="url(#accent)"/>

    <!-- Swoosh/stripe design element -->
    <path d="M 160 310 
             Q 200 280 280 265 
             L 420 235 
             Q 500 220 570 240 
             L 630 265 
             Q 580 250 520 255 
             L 360 275 
             Q 260 290 200 320 
             Z" 
          fill="#ffffff" opacity="0.25"/>

    <!-- Lace area dots -->
    <g fill="#ffffff" opacity="0.6">
      <circle cx="200" cy="190" r="8"/>
      <circle cx="250" cy="180" r="8"/>
      <circle cx="195" cy="220" r="7"/>
      <circle cx="245" cy="210" r="7"/>
      <circle cx="190" cy="250" r="6"/>
      <circle cx="240" cy="240" r="6"/>
    </g>

    <!-- Lace lines -->
    <g stroke="#ffffff" stroke-width="3" opacity="0.4" fill="none">
      <line x1="200" y1="190" x2="245" y2="210"/>
      <line x1="250" y1="180" x2="195" y2="220"/>
      <line x1="195" y1="220" x2="240" y2="240"/>
      <line x1="245" y1="210" x2="190" y2="250"/>
    </g>

    <!-- Speed lines (motion) -->
    <g stroke="#e94560" stroke-width="4" opacity="0.4" stroke-linecap="round">
      <line x1="-20" y1="250" x2="30" y2="250"/>
      <line x1="-30" y1="300" x2="40" y2="300"/>
      <line x1="-15" y1="350" x2="45" y2="350"/>
    </g>
  </g>

  <!-- "CoachLM" text below -->
  <text x="512" y="820" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="90" fill="#ffffff" letter-spacing="6" opacity="0.9">CoachLM</text>
</svg>
