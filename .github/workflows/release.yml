name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-22.04
    outputs:
      notes: ${{ steps.notes.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')

          if [ -z "$PREVIOUS_TAG" ]; then
            RANGE="$CURRENT_TAG"
          else
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          fi

          FEATURES=""
          FIXES=""
          DOCS=""
          OTHER=""

          while IFS= read -r line; do
            if [ -z "$line" ]; then continue; fi
            MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')
            case "$MSG" in
              feat*) FEATURES="${FEATURES}- ${MSG}"$'\n' ;;
              fix*)  FIXES="${FIXES}- ${MSG}"$'\n' ;;
              docs*) DOCS="${DOCS}- ${MSG}"$'\n' ;;
              *)     OTHER="${OTHER}- ${MSG}"$'\n' ;;
            esac
          done <<< "$(git log --oneline "$RANGE")"

          CHANGELOG=""
          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}## Features"$'\n\n'"${FEATURES}"$'\n'
          fi
          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}## Fixes"$'\n\n'"${FIXES}"$'\n'
          fi
          if [ -n "$DOCS" ]; then
            CHANGELOG="${CHANGELOG}## Documentation"$'\n\n'"${DOCS}"$'\n'
          fi
          if [ -n "$OTHER" ]; then
            CHANGELOG="${CHANGELOG}## Other"$'\n\n'"${OTHER}"$'\n'
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No categorized changes since ${PREVIOUS_TAG:-initial commit}."
          fi

          {
            echo "changelog<<CHANGELOG_EOF"
            echo "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  release:
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
        with:
          tagName: v__VERSION__
          releaseName: 'CoachLM v__VERSION__'
          releaseBody: ${{ needs.changelog.outputs.notes }}
          releaseDraft: false
          prerelease: false
          includeRelease: true
          includeDebug: false
          args: --target ${{ matrix.target }}
